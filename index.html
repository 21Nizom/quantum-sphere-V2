<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Core Sphere v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="interface-overlay">
        <div class="top-bar">SYSTEM: ACTIVE // CORE_STABLE</div>
        <div class="bottom-bar">SHFT_COLOR: ON_CLICK</div>
    </div>
    <div class="vignette"></div>
    <canvas id="canvas"></canvas>
    <script src="script.js"></script>
</body>
</html>

<div class="cyber-scan-overlay" id="hudMatrix"></div>

<button class="cyber-menu-trigger" id="menuTrigger">[ MENU ]</button>

<div class="cyber-nav-deck" id="navDeck">
    <button class="cyber-close-btn" id="menuClose">✕ CLOSE</button>
    
    <div class="cyber-links-wrap">
        <a href="https://21nizom.github.io/Neon-periodic.X/" class="cyber-node"><span class="cyber-core"></span>ELEMENTS</a>
        <a href="https://21nizom.github.io/quantum-sphere-V2/" class="cyber-node active"><span class="cyber-core"></span>SPHERE</a>
        <a href="https://21nizom.github.io/S.I.N.G.U.L.A.R.I.T.Y.-X/" class="cyber-node"><span class="cyber-core"></span>VOID</a>
    </div>
    <button class="cyber-hud-btn" id="hudTrigger">[ MATRIX ]</button>
</div>

<style>
    .cyber-menu-trigger, .cyber-close-btn { display: none; }
    
    .cyber-nav-deck {
        position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        z-index: 2147483647; background: rgba(12, 5, 26, 0.95); padding: 6px 12px;
        border-radius: 6px; border: 1px solid #bd00ff;
        box-shadow: 0 0 20px rgba(189, 0, 255, 0.25); backdrop-filter: blur(6px);
        width: 94%; max-width: 600px; font-family: 'Courier New', Courier, monospace;
    }
    .cyber-links-wrap { display: flex; gap: 6px; }
    .cyber-node {
        color: #bd00ff; text-decoration: none; font-size: 12px; font-weight: bold;
        display: flex; align-items: center; gap: 6px; padding: 8px 14px;
        border: 1px solid transparent; border-radius: 4px; transition: all 0.25s ease; white-space: nowrap;
    }
    .cyber-node:hover, .cyber-node:active { background: rgba(189, 0, 255, 0.12); border-color: #bd00ff; text-shadow: 0 0 6px #bd00ff; }
    .cyber-core { width: 6px; height: 6px; background: #3b1f54; border-radius: 50%; display: inline-block; }
    
    .cyber-node.active { color: #fff; border-color: #00e5ff; background: rgba(0, 229, 255, 0.15); box-shadow: 0 0 10px rgba(0, 229, 255, 0.3); text-shadow: 0 0 5px #00e5ff; }
    .cyber-node.active .cyber-core { background: #00e5ff; box-shadow: 0 0 8px #00e5ff; animation: quantum-pulse 1.5s infinite; }

    .cyber-hud-btn {
        background: transparent; border: 1px solid #ffaa00; color: #ffaa00;
        padding: 8px 12px; font-family: 'Courier New', Courier, monospace; font-size: 11px;
        font-weight: bold; cursor: pointer; border-radius: 4px; transition: all 0.2s ease; touch-action: manipulation;
    }
    .cyber-hud-btn:hover, .cyber-hud-btn:active, .cyber-hud-btn.hud-on { background: rgba(255, 170, 0, 0.2); box-shadow: 0 0 12px #ffaa00; text-shadow: 0 0 5px #ffaa00; }

    .cyber-scan-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2147483646;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(189, 0, 255, 0.05) 50%), linear-gradient(90deg, rgba(0, 229, 255, 0.02), rgba(0, 0, 0, 0), rgba(189, 0, 255, 0.02));
        background-size: 100% 4px, 6px 100%; opacity: 0; transition: opacity 0.4s ease;
    }
    body.hud-active .cyber-scan-overlay { opacity: 1; animation: matrix-flicker 0.15s infinite; }

    @media (max-width: 600px) {
        .cyber-menu-trigger {
            display: block !important; position: fixed !important; top: 12px !important; right: 12px !important; 
            z-index: 2147483647 !important; pointer-events: auto !important;
            background: rgba(15, 5, 30, 0.95); border: 2px solid #bd00ff; color: #bd00ff;
            padding: 12px 16px; font-family: 'Courier New', Courier, monospace; font-size: 13px;
            font-weight: bold; border-radius: 20px; box-shadow: 0 0 15px rgba(189, 0, 255, 0.4);
            cursor: pointer; touch-action: manipulation;
        }
        .cyber-close-btn {
            display: block; position: absolute; top: 15px; right: 15px;
            background: transparent; border: 1px solid #bd00ff; color: #bd00ff;
            padding: 8px 12px; font-family: 'Courier New', Courier, monospace; font-size: 11px;
            font-weight: bold; border-radius: 12px; cursor: pointer;
        }
        .cyber-nav-deck {
            position: fixed; top: 0; right: -100%; left: auto; transform: none;
            width: 270px; height: 100%; flex-direction: column; justify-content: flex-start;
            align-items: stretch; gap: 35px; padding: 80px 20px 40px 20px;
            border-radius: 0; border: none; border-left: 2px solid #bd00ff;
            background: rgba(8, 3, 18, 0.98); box-shadow: -10px 0 30px rgba(189, 0, 255, 0.2);
            transition: right 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .cyber-nav-deck.open { right: 0; }
        .cyber-links-wrap { flex-direction: column; gap: 14px; }
        .cyber-node { font-size: 14px; padding: 14px 12px; border: 1px solid rgba(189, 0, 255, 0.2); border-radius: 8px; justify-content: flex-start; color: #bd00ff; }
        .cyber-node.active { border-color: #00e5ff; color: #00e5ff; background: rgba(0, 229, 255, 0.08); }
        .cyber-hud-btn { width: 100%; padding: 14px; font-size: 12px; text-align: center; margin-top: auto; border-radius: 8px; }
    }
    @keyframes quantum-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; text-shadow: 0 0 8px #00e5ff; } }
    @keyframes matrix-flicker { 0% { opacity: 0.95; } 50% { opacity: 1; } 100% { opacity: 0.97; } }
</style>

<script>
    (function() {
        let lastMenuTouch = 0;
        function interceptMenu(e) {
            const now = Date.now();
            if (e.type === 'click' && (now - lastMenuTouch < 400)) return;

            const trigger = e.target.closest('#menuTrigger');
            const close = e.target.closest('#menuClose');
            const hud = e.target.closest('#hudTrigger');
            const deck = document.getElementById('navDeck');

            if (trigger || close || hud) {
                if (e.type === 'touchstart') lastMenuTouch = now;
                e.stopPropagation();
            } else { return; }

            if (trigger && deck) deck.classList.add('open');
            if (close && deck) deck.classList.remove('open');
            if (hud) {
                e.preventDefault();
                document.body.classList.toggle('hud-active');
                hud.classList.toggle('hud-on');
            }
        }
        document.addEventListener('click', interceptMenu, true);
        document.addEventListener('touchstart', interceptMenu, true);
    })();
</script>
